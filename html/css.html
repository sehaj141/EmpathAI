<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CSS</title>
    <style>
        div,span{
            color: rgb(1, 12, 19);
            background-color: rgb(214, 195, 201);
        }
    </style>
</head>
<body>
    <div>Today I'm in CSS mood </div>
    <div>
        It's raining today.
    </div>
    <span>
        I am also good.
    </span>
    
    <h1 style="color: black ; background-color: aquamarine;">Three ways to add CSS to HTML</h1>
    <div>
        <ol>
            <li>Inline CSS</li>
            <li>Interal CSS</li>
        
        </ol>
        <style>
            h2{
                color: black;
                background-color: antiquewhite;
            }
        </style>
    </div>
</body>
</html>
