<html lang="en">

<head>

    <title>Document</title>
    <style>
        .red{
            color: red;
        }
    </style>
</head>

<body>
    <div class="container red bg-green">
        <div class="box" style="display: flex;" data-createdby="harry" data-conceptby="rohan" >Hey I am a box</div>
        <div class="box">Hey I am a box</div>
        <script>
             let div = document.createElement("div");
             div.innerHTML = "I have been inserted <b>by harry</b>"
             div.setAttribute("class", "created");
             document.querySelector(".container").before(div);
            let cont = document.querySelector(".container")
            cont.insertAdjacentHTML("afterbegin", " <b>I am under the water. Please help me here too much raining.... iuuuuooooo</b>")
        </script>
    </div>
</body>

</html>
